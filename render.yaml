# Render Blueprint for UMZ Backend
services:
  - type: web
    name: umz-backend
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./umz-backend/Dockerfile
    dockerContext: ./umz-backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://umz.vercel.app
