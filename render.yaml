# Render Blueprint for UMSY Backend
services:
  - type: web
    name: umsy-backend
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./umsy-backend/Dockerfile
    dockerContext: ./umsy-backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://umsy.vercel.app
